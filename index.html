<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Jogo do Número Secreto</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            width: 320px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        h1 {
            color: #2a5298;
            margin-bottom: 10px;
        }

        #textoCima {
            color: #555;
            margin-bottom: 20px;
        }

        input {
            padding: 10px;
            width: 80%;
            border: 2px solid #ddd;
            border-radius: 8px;
            outline: none;
            margin-bottom: 15px;
            font-size: 16px;
        }

        input:focus {
            border-color: #2a5298;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background: #2a5298;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin: 5px;
            transition: 0.3s;
        }

        button:hover {
            background: #1e3c72;
        }

        button:disabled {
            background: #aaa;
            cursor: not-allowed;
        }

        #mensagem {
            margin-top: 15px;
            font-weight: bold;
            color: #333;
        }
    </style>

</head>

<body>
    <div class="container">

    <h1>Jogo do Número Secreto</h1>

    <p id="textoCima">Escolha um número entre 1 e 10</p>

    <input type="number" id="inputNumero" placeholder="Digite um número">

    <button id="btnChutar" onclick="verificarChute()">Chutar</button>

    <button id="btnReiniciar" onclick="reiniciarJogo()" disabled>Reiniciar</button>

    <p id="mensagem"></p>

    </div>

    <script src="script.js"></script>

</body>
</html>
